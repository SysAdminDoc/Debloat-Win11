name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck
          $scripts = Get-ChildItem -Path . -Filter '*.ps1' -Recurse | Where-Object { $_.FullName -notmatch '[\\/]tests[\\/]' }
          $allResults = @()
          foreach ($script in $scripts) {
            $allResults += Invoke-ScriptAnalyzer -Path $script.FullName -Severity Error,Warning -ExcludeRule PSAvoidUsingWriteHost
          }
          if ($allResults) {
            $allResults | Format-Table -AutoSize
            throw "$($allResults.Count) PSScriptAnalyzer issues found"
          }
          Write-Host "PSScriptAnalyzer: No issues found across $($scripts.Count) files"

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $result = Invoke-Pester ./tests/ -Passthru
          if ($result.FailedCount -gt 0) {
            throw "$($result.FailedCount) Pester tests failed"
          }
          Write-Host "Pester: $($result.PassedCount) tests passed"

      - name: DryRun Smoke Test
        shell: pwsh
        run: |
          # Verify parameter binding and module dot-sourcing work without errors
          # CheckDrift mode is the lightest path that exercises param binding and exits cleanly
          $proc = Start-Process pwsh -ArgumentList '-ExecutionPolicy','Bypass','-NonInteractive','-File','Debloat-Win11.ps1','-CheckDrift' -Wait -PassThru -WindowStyle Hidden
          if ($proc.ExitCode -ne 0) {
            throw "DryRun smoke test failed with exit code $($proc.ExitCode)"
          }
          Write-Host "DryRun smoke test: passed (exit code 0)"
